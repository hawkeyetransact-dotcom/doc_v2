<text x="880.0" y="1226.0" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="8.4" font-weight="600" fill="#dc2626" text-anchor="middle">Honest nuance: AI attaches per-module &amp; per-wave (not literally one slot per pillar); validation today is audit/compliance-centric; on-prem is validation-gated not yet proven e2e; toolCallingRuntime is custom (not MCP).</text>
