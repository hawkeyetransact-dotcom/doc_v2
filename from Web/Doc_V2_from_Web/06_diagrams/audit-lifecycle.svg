<svg xmlns="http://www.w3.org/2000/svg" width="1660" height="560" viewBox="0 0 1660 560" font-family="Segoe UI,Helvetica,Arial,sans-serif">
<defs><marker id="a2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,3 L0,6 Z" fill="#1e40af"/></marker></defs>
<rect width="1660" height="560" fill="#ffffff"/>
<text x="830.0" y="40.0" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="23" font-weight="700" fill="#0f172a" text-anchor="middle">Audit Lifecycle — State Machine</text>
<text x="830.0" y="62.0" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="400" fill="#64748b" text-anchor="middle">Statuses and the transitions between them, with the gate (who/what) on each transition.</text>
<rect x="60.0" y="170" width="220" height="66" rx="10" fill="#eff6ff" stroke="#1e40af" stroke-width="2"/>
<text x="170.0" y="200.0" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="800" fill="#1e40af" text-anchor="middle">PLANNED</text>
<text x="170.0" y="220.0" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="9" font-weight="500" fill="#64748b" text-anchor="middle">created</text>
<rect x="390.0" y="170" width="220" height="66" rx="10" fill="#ecfeff" stroke="#0891b2" stroke-width="2"/>
<text x="500.0" y="200.0" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="800" fill="#0891b2" text-anchor="middle">IN PROGRESS</text>
<text x="500.0" y="220.0" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="9" font-weight="500" fill="#64748b" text-anchor="middle">auditing</text>
<rect x="720.0" y="170" width="220" height="66" rx="10" fill="#fffbeb" stroke="#d97706" stroke-width="2"/>
<text x="830.0" y="200.0" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="800" fill="#d97706" text-anchor="middle">PENDING REVIEW</text>
<text x="830.0" y="220.0" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="9" font-weight="500" fill="#64748b" text-anchor="middle">report drafted</text>
<rect x="1050.0" y="170" width="220" height="66" rx="10" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
<text x="1160.0" y="200.0" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="800" fill="#7c3aed" text-anchor="middle">SIGNED</text>
<text x="1160.0" y="220.0" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="9" font-weight="500" fill="#64748b" text-anchor="middle">e-signed</text>
<rect x="1380.0" y="170" width="220" height="66" rx="10" fill="#f0fdf4" stroke="#059669" stroke-width="2"/>
<text x="1490.0" y="200.0" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="800" fill="#059669" text-anchor="middle">CLOSED</text>
<text x="1490.0" y="220.0" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="9" font-weight="500" fill="#64748b" text-anchor="middle">complete</text>
<line x1="280.0" y1="203.0" x2="388.0" y2="203.0" stroke="#1e40af" stroke-width="2.4" marker-end="url(#a2)"/>
<text x="335.0" y="185.0" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="8.6" font-weight="700" fill="#475569" text-anchor="middle">Create Audit</text>
<text x="335.0" y="197.0" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="8.6" font-weight="500" fill="#475569" text-anchor="middle">(lead auditor)</text>
<line x1="610.0" y1="203.0" x2="718.0" y2="203.0" stroke="#1e40af" stroke-width="2.4" marker-end="url(#a2)"/>
<text x="665.0" y="185.0" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="8.6" font-weight="700" fill="#475569" text-anchor="middle">Start Audit</text>
<text x="665.0" y="197.0" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="8.6" font-weight="500" fill="#475569" text-anchor="middle">(auditor)</text>
<line x1="940.0" y1="203.0" x2="1048.0" y2="203.0" stroke="#1e40af" stroke-width="2.4" marker-end="url(#a2)"/>
<text x="995.0" y="185.0" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="8.6" font-weight="700" fill="#475569" text-anchor="middle">Submit for review</text>
<text x="995.0" y="197.0" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="8.6" font-weight="500" fill="#475569" text-anchor="middle">(auditor)</text>
<line x1="1270.0" y1="203.0" x2="1378.0" y2="203.0" stroke="#1e40af" stroke-width="2.4" marker-end="url(#a2)"/>
<text x="1325.0" y="185.0" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="8.6" font-weight="700" fill="#475569" text-anchor="middle">E-sign</text>
<text x="1325.0" y="197.0" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="8.6" font-weight="500" fill="#059669" text-anchor="middle">(approver — human)</text>
<path d="M830.0,236 q 0,70 -330.0,70 q -120,0 -120,-70" fill="none" stroke="#dc2626" stroke-width="1.8" stroke-dasharray="6,4" marker-end="url(#a2)"/>
<text x="555.0" y="328.0" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="9" font-weight="600" fill="#dc2626" text-anchor="middle">Reject / rework → back to In Progress (reviewer)</text>
<text x="170" y="140.0" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="8.6" font-weight="500" fill="#64748b" text-anchor="middle">entry: scheduled or for-cause</text>
<rect x="60.0" y="386" width="493.3333333333333" height="120" rx="9" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2"/>
<text x="74.0" y="408.0" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="11" font-weight="700" fill="#0f172a" text-anchor="start">Guards on transitions</text>
<text x="74.0" y="426.0" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="8.8" font-weight="400" fill="#64748b" text-anchor="start">Each transition is permission-gated: only the configured role</text>
<text x="74.0" y="439.0" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="8.8" font-weight="400" fill="#64748b" text-anchor="start">can perform it (see Role Matrix). Transitions are logged to</text>
<text x="74.0" y="452.0" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="8.8" font-weight="400" fill="#64748b" text-anchor="start">the Audit Trail.</text>
<rect x="583.3333333333333" y="386" width="493.3333333333333" height="120" rx="9" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2"/>
<text x="597.3333333333333" y="408.0" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="11" font-weight="700" fill="#0f172a" text-anchor="start">The human gate</text>
<text x="597.3333333333333" y="426.0" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="8.8" font-weight="400" fill="#64748b" text-anchor="start">SIGNED is reachable only by a human e-signature. No AI agent</text>
<text x="597.3333333333333" y="439.0" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="8.8" font-weight="400" fill="#64748b" text-anchor="start">and no automation can move a record into SIGNED — this is</text>
<text x="597.3333333333333" y="452.0" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="8.8" font-weight="400" fill="#64748b" text-anchor="start">enforced, not conventional.</text>
<rect x="1106.6666666666665" y="386" width="493.3333333333333" height="120" rx="9" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.2"/>
<text x="1120.6666666666665" y="408.0" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="11" font-weight="700" fill="#0f172a" text-anchor="start">Configurable</text>
<text x="1120.6666666666665" y="426.0" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="8.8" font-weight="400" fill="#64748b" text-anchor="start">Admins can require additional approvals, add custom</text>
<text x="1120.6666666666665" y="439.0" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="8.8" font-weight="400" fill="#64748b" text-anchor="start">sub-statuses, or enforce that all findings link to a CAPA</text>
<text x="1120.6666666666665" y="452.0" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="8.8" font-weight="400" fill="#64748b" text-anchor="start">before CLOSED (see Workflow Config).</text>
<text x="830.0" y="548.0" font-family="Segoe UI,Helvetica,Arial,sans-serif" font-size="8.6" font-weight="600" fill="#dc2626" text-anchor="middle">Representative lifecycle. Confirm exact status names and transition rules against the live workflow engine.</text>
</svg>