<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Inter,sans-serif">
  <rect width="1200" height="600" fill="#FAFBFC"/>

  <!-- Title -->
  <rect x="0" y="0" width="1200" height="56" fill="#0F2042"/>
  <text x="32" y="35" fill="#FFFFFF" font-size="18" font-weight="700">Audit Management — 8-Phase Lifecycle</text>
  <text x="32" y="50" fill="#94A3B8" font-size="10.5">Persona swim-lanes · G1-G8 enforcement gates · Forward-only state machine with audit-trail writes</text>
  <text x="1168" y="35" fill="#F59E0B" font-size="11" font-weight="700" text-anchor="end">v1.0</text>

  <!-- Phase header band -->
  <g transform="translate(140,72)">
    <rect width="1040" height="36" rx="6" fill="#1E3A6E"/>
    <g fill="#FFFFFF" font-size="10.5" font-weight="700" text-anchor="middle">
      <text x="65"  y="22">1. INITIATED</text>
      <text x="195" y="22">2. PREP</text>
      <text x="325" y="22">3. PLANNING</text>
      <text x="455" y="22">4. EXECUTION</text>
      <text x="585" y="22">5. FINDINGS</text>
      <text x="715" y="22">6. CAPA</text>
      <text x="845" y="22">7. CLOSURE</text>
      <text x="975" y="22">8. SURVEILLANCE</text>
    </g>
    <!-- Vertical separators -->
    <g stroke="#94A3B8" stroke-width="0.5" opacity="0.5">
      <line x1="130" y1="0" x2="130" y2="36"/>
      <line x1="260" y1="0" x2="260" y2="36"/>
      <line x1="390" y1="0" x2="390" y2="36"/>
      <line x1="520" y1="0" x2="520" y2="36"/>
      <line x1="650" y1="0" x2="650" y2="36"/>
      <line x1="780" y1="0" x2="780" y2="36"/>
      <line x1="910" y1="0" x2="910" y2="36"/>
    </g>
  </g>

  <!-- Lane: Buyer (Priya / Elena) -->
  <g transform="translate(0,120)">
    <rect x="20" y="0" width="110" height="120" rx="6" fill="#DBEAFE" stroke="#1E40AF" stroke-width="1.5"/>
    <text x="75" y="32" fill="#1E3A6E" font-size="11" font-weight="700" text-anchor="middle">🟦 BUYER</text>
    <text x="75" y="50" fill="#1E40AF" font-size="9" text-anchor="middle">Priya · Elena</text>
    <text x="75" y="68" fill="#475569" font-size="8.5" text-anchor="middle">QA Program</text>
    <text x="75" y="80" fill="#475569" font-size="8.5" text-anchor="middle">VP Quality</text>
  </g>

  <!-- Lane: Auditor (Maria / Rahul) -->
  <g transform="translate(0,250)">
    <rect x="20" y="0" width="110" height="120" rx="6" fill="#F3E8FF" stroke="#7C3AED" stroke-width="1.5"/>
    <text x="75" y="32" fill="#581C87" font-size="11" font-weight="700" text-anchor="middle">🟪 AUDITOR</text>
    <text x="75" y="50" fill="#7C3AED" font-size="9" text-anchor="middle">Maria · Rahul</text>
    <text x="75" y="68" fill="#475569" font-size="8.5" text-anchor="middle">Lead + Co-</text>
    <text x="75" y="80" fill="#475569" font-size="8.5" text-anchor="middle">3rd-party or internal</text>
  </g>

  <!-- Lane: Supplier (Asha + team) -->
  <g transform="translate(0,380)">
    <rect x="20" y="0" width="110" height="120" rx="6" fill="#DCFCE7" stroke="#15803D" stroke-width="1.5"/>
    <text x="75" y="32" fill="#14532D" font-size="11" font-weight="700" text-anchor="middle">🟩 SUPPLIER</text>
    <text x="75" y="50" fill="#15803D" font-size="9" text-anchor="middle">Asha + team</text>
    <text x="75" y="68" fill="#475569" font-size="8.5" text-anchor="middle">QA Head</text>
    <text x="75" y="80" fill="#475569" font-size="8.5" text-anchor="middle">Section owners</text>
  </g>

  <!-- ============== ACTIVITY CELLS ============== -->
  <!-- BUYER LANE: INITIATED, CLOSURE -->
  <g>
    <!-- Initiated -->
    <rect x="146" y="130" width="118" height="100" rx="5" fill="#FFFFFF" stroke="#1E40AF" stroke-width="1"/>
    <text x="205" y="148" fill="#0F2042" font-size="10" font-weight="700" text-anchor="middle">Create audit request</text>
    <text x="205" y="162" fill="#475569" font-size="9" text-anchor="middle">Supplier · scope</text>
    <text x="205" y="174" fill="#475569" font-size="9" text-anchor="middle">+ assign auditor</text>
    <text x="205" y="186" fill="#475569" font-size="9" text-anchor="middle">+ target date</text>
    <text x="205" y="208" fill="#1E40AF" font-size="8" font-style="italic" text-anchor="middle">via App Wizard</text>
    <text x="205" y="220" fill="#1E40AF" font-size="8" font-style="italic" text-anchor="middle">or manual form</text>

    <!-- Closure (cell 7) -->
    <rect x="796" y="130" width="118" height="100" rx="5" fill="#FFFFFF" stroke="#1E40AF" stroke-width="1"/>
    <text x="855" y="148" fill="#0F2042" font-size="10" font-weight="700" text-anchor="middle">Approve closure cert</text>
    <text x="855" y="162" fill="#475569" font-size="9" text-anchor="middle">Sign APPROVED</text>
    <text x="855" y="174" fill="#475569" font-size="9" text-anchor="middle">(counter-sign</text>
    <text x="855" y="186" fill="#475569" font-size="9" text-anchor="middle">auditor's AUTHORED)</text>
    <g transform="translate(820,196)">
      <rect width="70" height="22" rx="11" fill="#B91C1C"/>
      <text x="35" y="15" fill="#FFFFFF" font-size="9" font-weight="700" text-anchor="middle">🔒 G8</text>
    </g>
  </g>

  <!-- AUDITOR LANE: PLANNING, EXECUTION, FINDINGS, SURVEILLANCE -->
  <g>
    <!-- Planning (cell 3) -->
    <rect x="406" y="260" width="118" height="100" rx="5" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1"/>
    <text x="465" y="278" fill="#0F2042" font-size="10" font-weight="700" text-anchor="middle">Build + lock scope</text>
    <text x="465" y="292" fill="#475569" font-size="9" text-anchor="middle">Curate in-scope</text>
    <text x="465" y="304" fill="#475569" font-size="9" text-anchor="middle">questions</text>
    <text x="465" y="316" fill="#475569" font-size="9" text-anchor="middle">+ finalize</text>
    <g transform="translate(430,328)">
      <rect width="70" height="22" rx="11" fill="#B91C1C"/>
      <text x="35" y="15" fill="#FFFFFF" font-size="9" font-weight="700" text-anchor="middle">🔒 G5</text>
    </g>

    <!-- Execution (cell 4) -->
    <rect x="536" y="260" width="118" height="100" rx="5" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1"/>
    <text x="595" y="278" fill="#0F2042" font-size="10" font-weight="700" text-anchor="middle">Onsite / remote</text>
    <text x="595" y="292" fill="#475569" font-size="9" text-anchor="middle">RemoteSession</text>
    <text x="595" y="304" fill="#475569" font-size="9" text-anchor="middle">(Zoom/Teams)</text>
    <text x="595" y="316" fill="#475569" font-size="9" text-anchor="middle">+ AuditNote evidence</text>
    <text x="595" y="334" fill="#7C3AED" font-size="8" font-style="italic" text-anchor="middle">text · photo · audio</text>

    <!-- Findings (cell 5) -->
    <rect x="666" y="260" width="118" height="100" rx="5" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1"/>
    <text x="725" y="278" fill="#0F2042" font-size="10" font-weight="700" text-anchor="middle">AI draft + sign</text>
    <text x="725" y="292" fill="#475569" font-size="9" text-anchor="middle">observationDrafter</text>
    <text x="725" y="304" fill="#475569" font-size="9" text-anchor="middle">+ auditorCoach</text>
    <text x="725" y="316" fill="#475569" font-size="9" text-anchor="middle">+ report assembler</text>
    <g transform="translate(690,328)">
      <rect width="78" height="22" rx="11" fill="#7C3AED"/>
      <text x="39" y="15" fill="#FFFFFF" font-size="9" font-weight="700" text-anchor="middle">🤖 G12 AI</text>
    </g>

    <!-- Surveillance (cell 8) -->
    <rect x="926" y="260" width="118" height="100" rx="5" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1"/>
    <text x="985" y="278" fill="#0F2042" font-size="10" font-weight="700" text-anchor="middle">Follow-up</text>
    <text x="985" y="292" fill="#475569" font-size="9" text-anchor="middle">Periodic</text>
    <text x="985" y="304" fill="#475569" font-size="9" text-anchor="middle">monitoring</text>
    <text x="985" y="316" fill="#475569" font-size="9" text-anchor="middle">+ effectiveness</text>
    <text x="985" y="328" fill="#475569" font-size="9" text-anchor="middle">check trigger</text>
  </g>

  <!-- SUPPLIER LANE: PREP, CAPA -->
  <g>
    <!-- Prep (cell 2) -->
    <rect x="276" y="390" width="118" height="100" rx="5" fill="#FFFFFF" stroke="#15803D" stroke-width="1"/>
    <text x="335" y="408" fill="#0F2042" font-size="10" font-weight="700" text-anchor="middle">Accept + PAQ</text>
    <text x="335" y="422" fill="#475569" font-size="9" text-anchor="middle">Sign intimation</text>
    <text x="335" y="434" fill="#475569" font-size="9" text-anchor="middle">+ assign sections</text>
    <text x="335" y="446" fill="#475569" font-size="9" text-anchor="middle">+ submit PAQ</text>
    <g transform="translate(300,458)">
      <rect width="70" height="22" rx="11" fill="#B91C1C"/>
      <text x="35" y="15" fill="#FFFFFF" font-size="9" font-weight="700" text-anchor="middle">🔒 G1</text>
    </g>

    <!-- CAPA (cell 6) -->
    <rect x="666" y="390" width="118" height="100" rx="5" fill="#FFFFFF" stroke="#15803D" stroke-width="1"/>
    <text x="725" y="408" fill="#0F2042" font-size="10" font-weight="700" text-anchor="middle">Author CAPA</text>
    <text x="725" y="422" fill="#475569" font-size="9" text-anchor="middle">Per observation</text>
    <text x="725" y="434" fill="#475569" font-size="9" text-anchor="middle">+ RCA + actions</text>
    <text x="725" y="446" fill="#475569" font-size="9" text-anchor="middle">+ effectiveness</text>
    <text x="725" y="464" fill="#15803D" font-size="8" font-style="italic" text-anchor="middle">→ CAPA module</text>
  </g>

  <!-- Flow arrows between phases -->
  <g stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrowGray2)">
    <!-- Initiated → Prep -->
    <path d="M 265 180 L 275 180 L 275 440 L 275 440" stroke-dasharray="4,3"/>
    <!-- Prep → Planning -->
    <path d="M 395 440 L 405 440 L 405 310 L 405 310" stroke-dasharray="4,3"/>
    <!-- Planning → Execution -->
    <path d="M 525 310 L 535 310"/>
    <!-- Execution → Findings -->
    <path d="M 655 310 L 665 310"/>
    <!-- Findings → CAPA -->
    <path d="M 725 361 L 725 389"/>
    <!-- CAPA → Closure -->
    <path d="M 785 440 L 795 440 L 795 180 L 795 180" stroke-dasharray="4,3"/>
    <!-- Closure → Surveillance -->
    <path d="M 915 180 L 925 180 L 925 310 L 925 310" stroke-dasharray="4,3"/>
  </g>

  <!-- Gate legend -->
  <g transform="translate(146,530)">
    <text x="0" y="12" fill="#0F2042" font-size="10" font-weight="700">Gates:</text>
    <g transform="translate(54,0)">
      <rect width="70" height="22" rx="11" fill="#B91C1C"/>
      <text x="35" y="15" fill="#FFFFFF" font-size="9" font-weight="700" text-anchor="middle">🔒 G1</text>
    </g>
    <text x="130" y="15" fill="#475569" font-size="9">Intimation e-sig (Part 11)</text>
    <g transform="translate(260,0)">
      <rect width="70" height="22" rx="11" fill="#B91C1C"/>
      <text x="35" y="15" fill="#FFFFFF" font-size="9" font-weight="700" text-anchor="middle">🔒 G5</text>
    </g>
    <text x="336" y="15" fill="#475569" font-size="9">Scope lock</text>
    <g transform="translate(420,0)">
      <rect width="78" height="22" rx="11" fill="#7C3AED"/>
      <text x="39" y="15" fill="#FFFFFF" font-size="9" font-weight="700" text-anchor="middle">🤖 G12 AI</text>
    </g>
    <text x="504" y="15" fill="#475569" font-size="9">Grounded AI + report sign</text>
    <g transform="translate(670,0)">
      <rect width="70" height="22" rx="11" fill="#B91C1C"/>
      <text x="35" y="15" fill="#FFFFFF" font-size="9" font-weight="700" text-anchor="middle">🔒 G8</text>
    </g>
    <text x="746" y="15" fill="#475569" font-size="9">Closure dual e-sig (Auditor AUTHORED + Buyer APPROVED)</text>
  </g>

  <text x="600" y="585" fill="#475569" font-size="9" text-anchor="middle" font-style="italic">
    Every phase transition writes an AuditTrail row · Forward-only (revert requires reasonForChange + tenant_admin) · Reachable in &lt;2 sec for any inspector query
  </text>

  <defs>
    <marker id="arrowGray2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
</svg>
