<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Inter,sans-serif">
  <!-- Background -->
  <rect width="1100" height="720" fill="#FAFBFC"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="1100" height="56" fill="#0F2042"/>
  <text x="32" y="35" fill="#FFFFFF" font-size="19" font-weight="700">Hawkeye Platform Architecture</text>
  <text x="32" y="50" fill="#94A3B8" font-size="10.5">Industry-agnostic compliance engine · Three layers · Code-verified against source</text>
  <text x="1068" y="35" fill="#F59E0B" font-size="11" font-weight="700" text-anchor="end">v1.0</text>

  <!-- ===================== CONFIGURATION LAYER ===================== -->
  <g transform="translate(40,80)">
    <rect width="1020" height="120" rx="10" fill="#FEF3C7" stroke="#92400E" stroke-width="1.5"/>
    <text x="20" y="26" fill="#78350F" font-size="11" font-weight="700" letter-spacing="0.08em">⚙️  CONFIGURATION LAYER · INDUSTRY-AGNOSTIC BY DESIGN</text>
    <text x="20" y="42" fill="#92400E" font-size="9.5" font-style="italic">Standards, vocabulary, and workflows are data — not code. Adding a new vertical = new config pack, not a fork.</text>

    <!-- 4 config boxes -->
    <g transform="translate(20,55)">
      <rect width="235" height="52" rx="6" fill="#FFFFFF" stroke="#D97706" stroke-width="1"/>
      <text x="14" y="20" fill="#0F2042" font-size="11" font-weight="700">Vocabulary</text>
      <text x="14" y="35" fill="#475569" font-size="9.5">vocabularyService.js</text>
      <text x="14" y="46" fill="#94A3B8" font-size="9">per-tenant renames · defaults fallback</text>
    </g>
    <g transform="translate(265,55)">
      <rect width="235" height="52" rx="6" fill="#FFFFFF" stroke="#D97706" stroke-width="1"/>
      <text x="14" y="20" fill="#0F2042" font-size="11" font-weight="700">Standards as data</text>
      <text x="14" y="35" fill="#475569" font-size="9.5">standardRegistryService.js</text>
      <text x="14" y="46" fill="#94A3B8" font-size="9">ICH Q7 · 21 CFR · ISO 9001 · …</text>
    </g>
    <g transform="translate(510,55)">
      <rect width="235" height="52" rx="6" fill="#FFFFFF" stroke="#D97706" stroke-width="1"/>
      <text x="14" y="20" fill="#0F2042" font-size="11" font-weight="700">Module toggles</text>
      <text x="14" y="35" fill="#475569" font-size="9.5">universalModuleConfigService</text>
      <text x="14" y="46" fill="#94A3B8" font-size="9">industryProfile = PHARMA_GMP</text>
    </g>
    <g transform="translate(755,55)">
      <rect width="245" height="52" rx="6" fill="#FFFFFF" stroke="#D97706" stroke-width="1"/>
      <text x="14" y="20" fill="#0F2042" font-size="11" font-weight="700">Workflows as data</text>
      <text x="14" y="35" fill="#475569" font-size="9.5">WorkflowDefinitionService</text>
      <text x="14" y="46" fill="#94A3B8" font-size="9">tenant-scoped · versioned · loaded by key</text>
    </g>
  </g>

  <!-- Down-arrows from config to pipeline (5 small dashed arrows) -->
  <g stroke="#92400E" stroke-width="1.5" stroke-dasharray="3,3" fill="none">
    <path d="M 140 200 L 140 230" marker-end="url(#arrowAmber)"/>
    <path d="M 320 200 L 320 230" marker-end="url(#arrowAmber)"/>
    <path d="M 550 200 L 550 230" marker-end="url(#arrowAmber)"/>
    <path d="M 780 200 L 780 230" marker-end="url(#arrowAmber)"/>
    <path d="M 960 200 L 960 230" marker-end="url(#arrowAmber)"/>
  </g>
  <text x="550" y="218" fill="#92400E" font-size="9" font-style="italic" text-anchor="middle">configures each pillar</text>

  <!-- ===================== FIVE-PILLAR PIPELINE ===================== -->
  <g transform="translate(40,240)">
    <rect width="1020" height="240" rx="10" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="20" y="26" fill="#0F2042" font-size="11" font-weight="700" letter-spacing="0.08em">🔬  FIVE-PILLAR PIPELINE · THE UNIVERSAL MOTION</text>
    <text x="20" y="42" fill="#475569" font-size="9.5" font-style="italic">Pillars 1-2: Python data-platform.   Pillars 3-5: Node application.   Strip the pharma vocabulary and this motion is identical for every regulated industry.</text>

    <!-- Pillar 1: COLLECT (blue) -->
    <g transform="translate(20,60)">
      <rect width="190" height="170" rx="8" fill="#DBEAFE" stroke="#1E40AF" stroke-width="1.5"/>
      <circle cx="22" cy="22" r="13" fill="#1E3A6E"/>
      <text x="22" y="27" fill="#FFFFFF" font-size="13" font-weight="700" text-anchor="middle">1</text>
      <text x="44" y="27" fill="#0F2042" font-size="13" font-weight="700">COLLECT</text>
      <text x="14" y="46" fill="#1E40AF" font-size="9" font-style="italic">Python data-platform</text>
      <line x1="14" y1="52" x2="176" y2="52" stroke="#1E40AF" stroke-width="0.5"/>
      <text x="14" y="68" fill="#0F2042" font-size="9.5" font-weight="600">Code:</text>
      <text x="14" y="82" fill="#334155" font-size="9.5">crawlers/  parsers/</text>
      <text x="14" y="95" fill="#334155" font-size="9.5">pdf_extract/  publicIntel/</text>
      <text x="14" y="108" fill="#334155" font-size="9.5">docIntelService.js</text>
      <text x="14" y="128" fill="#0F2042" font-size="9.5" font-weight="600">Does:</text>
      <text x="14" y="142" fill="#475569" font-size="9.5">Structured + unstructured</text>
      <text x="14" y="155" fill="#475569" font-size="9.5">+ public-data + human</text>
    </g>

    <!-- Pillar 2: PROCESS (blue) -->
    <g transform="translate(220,60)">
      <rect width="190" height="170" rx="8" fill="#DBEAFE" stroke="#1E40AF" stroke-width="1.5"/>
      <circle cx="22" cy="22" r="13" fill="#1E3A6E"/>
      <text x="22" y="27" fill="#FFFFFF" font-size="13" font-weight="700" text-anchor="middle">2</text>
      <text x="44" y="27" fill="#0F2042" font-size="13" font-weight="700">PROCESS</text>
      <text x="14" y="46" fill="#1E40AF" font-size="9" font-style="italic">Python data-platform</text>
      <line x1="14" y1="52" x2="176" y2="52" stroke="#1E40AF" stroke-width="0.5"/>
      <text x="14" y="68" fill="#0F2042" font-size="9.5" font-weight="600">Code:</text>
      <text x="14" y="82" fill="#334155" font-size="9.5">normalize/</text>
      <text x="14" y="95" fill="#334155" font-size="9.5">entity_resolution/</text>
      <text x="14" y="108" fill="#334155" font-size="9.5">170 Mongoose models</text>
      <text x="14" y="121" fill="#334155" font-size="9.5">vector services</text>
      <text x="14" y="138" fill="#0F2042" font-size="9.5" font-weight="600">Does:</text>
      <text x="14" y="152" fill="#475569" font-size="9.5">Canonical model</text>
      <text x="14" y="164" fill="#475569" font-size="9.5">+ entity resolution</text>
    </g>

    <!-- Pillar 3: VALIDATE (green) -->
    <g transform="translate(420,60)">
      <rect width="190" height="170" rx="8" fill="#DCFCE7" stroke="#15803D" stroke-width="1.5"/>
      <circle cx="22" cy="22" r="13" fill="#14532D"/>
      <text x="22" y="27" fill="#FFFFFF" font-size="13" font-weight="700" text-anchor="middle">3</text>
      <text x="44" y="27" fill="#0F2042" font-size="13" font-weight="700">VALIDATE</text>
      <text x="14" y="46" fill="#15803D" font-size="9" font-style="italic">Node application</text>
      <line x1="14" y1="52" x2="176" y2="52" stroke="#15803D" stroke-width="0.5"/>
      <text x="14" y="68" fill="#0F2042" font-size="9.5" font-weight="600">Code:</text>
      <text x="14" y="82" fill="#334155" font-size="9.5">standardRegistry</text>
      <text x="14" y="95" fill="#334155" font-size="9.5">complianceEvaluation</text>
      <text x="14" y="108" fill="#334155" font-size="9.5">complianceRules.js</text>
      <text x="14" y="121" fill="#334155" font-size="9.5">risk/ scoring + orchestr.</text>
      <text x="14" y="138" fill="#0F2042" font-size="9.5" font-weight="600">Does:</text>
      <text x="14" y="152" fill="#475569" font-size="9.5">Standard's controls</text>
      <text x="14" y="164" fill="#475569" font-size="9.5">+ verdict + risk-weight</text>
    </g>

    <!-- Pillar 4: REPORT (green) -->
    <g transform="translate(620,60)">
      <rect width="190" height="170" rx="8" fill="#DCFCE7" stroke="#15803D" stroke-width="1.5"/>
      <circle cx="22" cy="22" r="13" fill="#14532D"/>
      <text x="22" y="27" fill="#FFFFFF" font-size="13" font-weight="700" text-anchor="middle">4</text>
      <text x="44" y="27" fill="#0F2042" font-size="13" font-weight="700">REPORT</text>
      <text x="14" y="46" fill="#15803D" font-size="9" font-style="italic">Node application</text>
      <line x1="14" y1="52" x2="176" y2="52" stroke="#15803D" stroke-width="0.5"/>
      <text x="14" y="68" fill="#0F2042" font-size="9.5" font-weight="600">Code:</text>
      <text x="14" y="82" fill="#334155" font-size="9.5">reportDataService.js</text>
      <text x="14" y="95" fill="#334155" font-size="9.5">auditReportAgent</text>
      <text x="14" y="108" fill="#334155" font-size="9.5">auditReportModel</text>
      <text x="14" y="121" fill="#334155" font-size="9.5">electronicSignature</text>
      <text x="14" y="138" fill="#0F2042" font-size="9.5" font-weight="600">Does:</text>
      <text x="14" y="152" fill="#475569" font-size="9.5">Cited artifact</text>
      <text x="14" y="164" fill="#475569" font-size="9.5">+ human e-sign</text>
    </g>

    <!-- Pillar 5: SEAL (navy, the moat) -->
    <g transform="translate(820,60)">
      <rect width="180" height="170" rx="8" fill="#1E3A6E" stroke="#0F2042" stroke-width="2"/>
      <circle cx="22" cy="22" r="13" fill="#F59E0B"/>
      <text x="22" y="27" fill="#FFFFFF" font-size="13" font-weight="700" text-anchor="middle">5</text>
      <text x="44" y="27" fill="#FFFFFF" font-size="13" font-weight="700">SEAL</text>
      <text x="14" y="46" fill="#F59E0B" font-size="9" font-style="italic">Node · the regulatory moat</text>
      <line x1="14" y1="52" x2="166" y2="52" stroke="#F59E0B" stroke-width="0.5"/>
      <text x="14" y="68" fill="#FFFFFF" font-size="9.5" font-weight="600">Code:</text>
      <text x="14" y="82" fill="#CBD5E1" font-size="9.5">auditTrailService.js</text>
      <text x="14" y="95" fill="#CBD5E1" font-size="9.5">(Part-11 + Annex-11)</text>
      <text x="14" y="108" fill="#CBD5E1" font-size="9.5">SHA-256 buildSnapshot</text>
      <text x="14" y="121" fill="#CBD5E1" font-size="9.5">aiAuditTrail.recordAi…</text>
      <text x="14" y="138" fill="#FFFFFF" font-size="9.5" font-weight="600">Does:</text>
      <text x="14" y="152" fill="#CBD5E1" font-size="9.5">Tamper-evident</text>
      <text x="14" y="164" fill="#CBD5E1" font-size="9.5">+ append-only ALCOA+</text>
    </g>

    <!-- Pipeline flow arrows between pillars -->
    <g stroke="#475569" stroke-width="2.5" fill="none">
      <path d="M 210 145 L 220 145" marker-end="url(#arrowGray)"/>
      <path d="M 410 145 L 420 145" marker-end="url(#arrowGray)"/>
      <path d="M 610 145 L 620 145" marker-end="url(#arrowGray)"/>
      <path d="M 810 145 L 820 145" marker-end="url(#arrowGray)"/>
    </g>

    <!-- Boundary marker between Python and Node -->
    <line x1="415" y1="60" x2="415" y2="230" stroke="#0369A1" stroke-width="0.5" stroke-dasharray="2,3"/>
    <rect x="380" y="55" width="78" height="14" rx="3" fill="#FFFFFF" stroke="#0369A1" stroke-width="0.5"/>
    <text x="419" y="65" fill="#0369A1" font-size="8" font-weight="700" text-anchor="middle">PY ⟷ NODE</text>
  </g>

  <!-- Up-arrows from AI to pipeline -->
  <g stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="3,3" fill="none">
    <path d="M 140 520 L 140 490" marker-end="url(#arrowPurple)"/>
    <path d="M 320 520 L 320 490" marker-end="url(#arrowPurple)"/>
    <path d="M 550 520 L 550 490" marker-end="url(#arrowPurple)"/>
    <path d="M 780 520 L 780 490" marker-end="url(#arrowPurple)"/>
    <path d="M 960 520 L 960 490" marker-end="url(#arrowPurple)"/>
  </g>
  <text x="550" y="510" fill="#7C3AED" font-size="9" font-style="italic" text-anchor="middle">plugs into each pillar · never commits a record</text>

  <!-- ===================== AI GATEWAY ===================== -->
  <g transform="translate(40,530)">
    <rect width="1020" height="150" rx="10" fill="#F3E8FF" stroke="#7C3AED" stroke-width="1.5"/>
    <text x="20" y="26" fill="#581C87" font-size="11" font-weight="700" letter-spacing="0.08em">🤖  AI GATEWAY · PLUGGABLE · GROUNDED · GOVERNED</text>
    <text x="20" y="42" fill="#7C3AED" font-size="9.5" font-style="italic">Every AI output is grounded-or-fallback (cite-or-insufficient-evidence) and never commits a record. Humans always review and e-sign.</text>

    <!-- 4 AI boxes -->
    <g transform="translate(20,55)">
      <rect width="235" height="78" rx="6" fill="#FFFFFF" stroke="#9333EA" stroke-width="1"/>
      <text x="14" y="20" fill="#0F2042" font-size="11" font-weight="700">Multi-LLM gateway</text>
      <text x="14" y="34" fill="#475569" font-size="9.5">ai/gateway/</text>
      <text x="14" y="48" fill="#94A3B8" font-size="9">Anthropic Claude · OpenAI</text>
      <text x="14" y="60" fill="#94A3B8" font-size="9">Gemini · local-vLLM (Wave-3)</text>
      <text x="14" y="72" fill="#94A3B8" font-size="9">Swap model per task</text>
    </g>
    <g transform="translate(265,55)">
      <rect width="235" height="78" rx="6" fill="#FFFFFF" stroke="#9333EA" stroke-width="1"/>
      <text x="14" y="20" fill="#0F2042" font-size="11" font-weight="700">Grounded generation</text>
      <text x="14" y="34" fill="#475569" font-size="9.5">groundedGenerationService.js</text>
      <text x="14" y="48" fill="#94A3B8" font-size="9">Every claim cites source</text>
      <text x="14" y="60" fill="#94A3B8" font-size="9">Confidence floor · PII redaction</text>
      <text x="14" y="72" fill="#94A3B8" font-size="9">Skeleton fallback if low-conf</text>
    </g>
    <g transform="translate(510,55)">
      <rect width="235" height="78" rx="6" fill="#FFFFFF" stroke="#9333EA" stroke-width="1"/>
      <text x="14" y="20" fill="#0F2042" font-size="11" font-weight="700">Per-module + audit agents</text>
      <text x="14" y="34" fill="#475569" font-size="9.5">ai/features/* · ai/audit-agents/*</text>
      <text x="14" y="48" fill="#94A3B8" font-size="9">6 audit agents (autofill / prep /</text>
      <text x="14" y="60" fill="#94A3B8" font-size="9">report / intel / fusion / entity)</text>
      <text x="14" y="72" fill="#94A3B8" font-size="9">Wave-2: multiStepAgent · toolRT</text>
    </g>
    <g transform="translate(755,55)">
      <rect width="245" height="78" rx="6" fill="#FFFFFF" stroke="#B91C1C" stroke-width="1"/>
      <text x="14" y="20" fill="#0F2042" font-size="11" font-weight="700">Governance (enforced)</text>
      <text x="14" y="34" fill="#475569" font-size="9.5">ai/governance/</text>
      <text x="14" y="48" fill="#94A3B8" font-size="9">agentPermissionService · RBAC</text>
      <text x="14" y="60" fill="#94A3B8" font-size="9">agentCostTable · roiCalculator</text>
      <text x="14" y="72" fill="#94A3B8" font-size="9">Cannot turn off grounded-or-fallback</text>
    </g>
  </g>

  <!-- Footer caption -->
  <text x="550" y="708" fill="#475569" font-size="9" text-anchor="middle" font-style="italic">
    Pillars 1-2 ingest · Pillars 3-4 reason · Pillar 5 anchors. Configuration above. AI below. The pipeline is fixed. The vertical is configuration.
  </text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#92400E"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7C3AED"/>
    </marker>
  </defs>
</svg>
