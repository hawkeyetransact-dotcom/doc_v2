<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Inter,sans-serif">
  <rect width="1000" height="640" fill="#FAFBFC"/>

  <!-- Title -->
  <rect x="0" y="0" width="1000" height="56" fill="#0F2042"/>
  <text x="32" y="35" fill="#FFFFFF" font-size="18" font-weight="700">AskHawk — The 3-Phase AI Co-worker</text>
  <text x="32" y="50" fill="#94A3B8" font-size="10.5">Cross-cutting AI · Regulations Q&amp;A · Workflow Playbooks · App Wizard plan-then-execute</text>
  <text x="968" y="35" fill="#F59E0B" font-size="11" font-weight="700" text-anchor="end">Shipped May 2026</text>

  <!-- ==================== 3 PHASE COLUMNS ==================== -->

  <!-- Phase 1: Regulations -->
  <g transform="translate(30,80)">
    <rect width="300" height="320" rx="10" fill="#FFFFFF" stroke="#1E40AF" stroke-width="2"/>
    <rect width="300" height="46" rx="10" fill="#1E40AF"/>
    <rect y="36" width="300" height="10" fill="#1E40AF"/>
    <circle cx="32" cy="23" r="14" fill="#F59E0B"/>
    <text x="32" y="28" fill="#0F2042" font-size="13" font-weight="700" text-anchor="middle">1</text>
    <text x="56" y="28" fill="#FFFFFF" font-size="13" font-weight="700">REGULATIONS Q&amp;A</text>

    <text x="20" y="74" fill="#0F2042" font-size="10.5" font-weight="700">What you ask</text>
    <text x="20" y="90" fill="#475569" font-size="9.5" font-style="italic">"What does 21 CFR 211.192 require?"</text>
    <text x="20" y="103" fill="#475569" font-size="9.5" font-style="italic">"Summarise ICH Q7 chapter 13"</text>

    <text x="20" y="128" fill="#0F2042" font-size="10.5" font-weight="700">What's seeded</text>
    <g transform="translate(20,138)">
      <rect width="260" height="22" rx="4" fill="#DBEAFE"/>
      <text x="10" y="15" fill="#1E3A6E" font-size="10" font-weight="700">11 standards × 32 clauses</text>
    </g>
    <text x="20" y="178" fill="#475569" font-size="9">• 21 CFR Part 11</text>
    <text x="20" y="191" fill="#475569" font-size="9">• 21 CFR Part 211</text>
    <text x="20" y="204" fill="#475569" font-size="9">• ICH Q7 · Q9 R1 · Q10</text>
    <text x="20" y="217" fill="#475569" font-size="9">• EU GMP Annex 11 · 16</text>
    <text x="20" y="230" fill="#475569" font-size="9">• EU GMP Ch 1 · 4 · 7</text>
    <text x="20" y="243" fill="#475569" font-size="9">• ISO 9001:2015</text>

    <text x="20" y="265" fill="#0F2042" font-size="10.5" font-weight="700">Where it lives</text>
    <text x="20" y="280" fill="#475569" font-size="9">backend/src/data/</text>
    <text x="20" y="291" fill="#475569" font-size="9">regulatory-corpus.json</text>
    <text x="20" y="305" fill="#94A3B8" font-size="8.5" font-style="italic">__platform__ tenant · cross-tenant readable</text>
  </g>

  <!-- Phase 2: SOPs + Playbooks -->
  <g transform="translate(350,80)">
    <rect width="300" height="320" rx="10" fill="#FFFFFF" stroke="#15803D" stroke-width="2"/>
    <rect width="300" height="46" rx="10" fill="#15803D"/>
    <rect y="36" width="300" height="10" fill="#15803D"/>
    <circle cx="32" cy="23" r="14" fill="#F59E0B"/>
    <text x="32" y="28" fill="#0F2042" font-size="13" font-weight="700" text-anchor="middle">2</text>
    <text x="56" y="28" fill="#FFFFFF" font-size="13" font-weight="700">SOPs + PLAYBOOKS</text>

    <text x="20" y="74" fill="#0F2042" font-size="10.5" font-weight="700">What you ask</text>
    <text x="20" y="90" fill="#475569" font-size="9.5" font-style="italic">"Show me the deviation investigation SOP"</text>
    <text x="20" y="103" fill="#475569" font-size="9.5" font-style="italic">"As a supplier QA, how do I respond?"</text>

    <text x="20" y="128" fill="#0F2042" font-size="10.5" font-weight="700">SOP templates</text>
    <g transform="translate(20,138)">
      <rect width="260" height="22" rx="4" fill="#DCFCE7"/>
      <text x="10" y="15" fill="#14532D" font-size="10" font-weight="700">6 SOPs × 5 sections each</text>
    </g>
    <text x="20" y="172" fill="#475569" font-size="9">Equipment cal · Deviation invest.</text>
    <text x="20" y="184" fill="#475569" font-size="9">Supplier qual · Change ctrl</text>
    <text x="20" y="196" fill="#475569" font-size="9">Training effective. · Annual prod.</text>

    <text x="20" y="222" fill="#0F2042" font-size="10.5" font-weight="700">Workflow playbooks</text>
    <g transform="translate(20,232)">
      <rect width="260" height="22" rx="4" fill="#DCFCE7"/>
      <text x="10" y="15" fill="#14532D" font-size="10" font-weight="700">38 playbooks · 9 personas × 12 modules</text>
    </g>
    <text x="20" y="266" fill="#475569" font-size="9">Audit PM · Lead Auditor · Co-Aud.</text>
    <text x="20" y="278" fill="#475569" font-size="9">Supplier QA · VP Quality · Doc Ctrl</text>
    <text x="20" y="290" fill="#475569" font-size="9">Reg Affairs · Production · Co-aud.</text>
    <text x="20" y="305" fill="#15803D" font-size="9" font-style="italic">Persona-aware retrieval</text>
  </g>

  <!-- Phase 3: App Wizard -->
  <g transform="translate(670,80)">
    <rect width="300" height="320" rx="10" fill="#FFFFFF" stroke="#7C3AED" stroke-width="2"/>
    <rect width="300" height="46" rx="10" fill="#7C3AED"/>
    <rect y="36" width="300" height="10" fill="#7C3AED"/>
    <circle cx="32" cy="23" r="14" fill="#F59E0B"/>
    <text x="32" y="28" fill="#0F2042" font-size="13" font-weight="700" text-anchor="middle">3</text>
    <text x="56" y="28" fill="#FFFFFF" font-size="13" font-weight="700">APP WIZARD</text>

    <text x="20" y="74" fill="#0F2042" font-size="10.5" font-weight="700">What you ask</text>
    <text x="20" y="90" fill="#475569" font-size="9.5" font-style="italic">"Create an audit for Sanpras with</text>
    <text x="20" y="103" fill="#475569" font-size="9.5" font-style="italic">Maria as lead auditor on Aug 15"</text>

    <text x="20" y="128" fill="#0F2042" font-size="10.5" font-weight="700">Plan → Approve → Execute</text>
    <text x="20" y="143" fill="#475569" font-size="9">Single e-sig covers all write steps</text>

    <text x="20" y="168" fill="#0F2042" font-size="10.5" font-weight="700">8 wizard tools</text>
    <g transform="translate(20,178)">
      <rect width="125" height="20" rx="3" fill="#F3E8FF"/>
      <text x="62" y="14" fill="#581C87" font-size="8.5" font-weight="600" text-anchor="middle">list_suppliers</text>
    </g>
    <g transform="translate(155,178)">
      <rect width="125" height="20" rx="3" fill="#F3E8FF"/>
      <text x="62" y="14" fill="#581C87" font-size="8.5" font-weight="600" text-anchor="middle">list_products</text>
    </g>
    <g transform="translate(20,202)">
      <rect width="125" height="20" rx="3" fill="#F3E8FF"/>
      <text x="62" y="14" fill="#581C87" font-size="8.5" font-weight="600" text-anchor="middle">find_auditor</text>
    </g>
    <g transform="translate(155,202)">
      <rect width="125" height="20" rx="3" fill="#F3E8FF"/>
      <text x="62" y="14" fill="#581C87" font-size="8.5" font-weight="600" text-anchor="middle">list_open_capas</text>
    </g>
    <g transform="translate(20,226)">
      <rect width="125" height="20" rx="3" fill="#F3E8FF"/>
      <text x="62" y="14" fill="#581C87" font-size="8.5" font-weight="600" text-anchor="middle">classify_deviation</text>
    </g>
    <g transform="translate(155,226)">
      <rect width="125" height="20" rx="3" fill="#F3E8FF"/>
      <text x="62" y="14" fill="#581C87" font-size="8.5" font-weight="600" text-anchor="middle">draft_observation</text>
    </g>
    <g transform="translate(20,250)">
      <rect width="125" height="20" rx="3" fill="#1E3A6E"/>
      <text x="62" y="14" fill="#FFFFFF" font-size="8.5" font-weight="700" text-anchor="middle">create_audit 🔒</text>
    </g>
    <g transform="translate(155,250)">
      <rect width="125" height="20" rx="3" fill="#1E3A6E"/>
      <text x="62" y="14" fill="#FFFFFF" font-size="8.5" font-weight="700" text-anchor="middle">create_capa 🔒</text>
    </g>

    <text x="20" y="290" fill="#475569" font-size="8.5" font-style="italic">🔒 = WRITE tool · requires e-sig</text>
    <text x="20" y="305" fill="#7C3AED" font-size="9">multiStepAgent · toolCallingRuntime</text>
  </g>

  <!-- ==================== SHARED INFRASTRUCTURE BAND ==================== -->
  <g transform="translate(30,430)">
    <rect width="940" height="100" rx="10" fill="#FEF3C7" stroke="#92400E" stroke-width="1.5"/>
    <text x="20" y="26" fill="#78350F" font-size="11" font-weight="700" letter-spacing="0.08em">⚙️  SHARED INFRASTRUCTURE · USED BY ALL 3 PHASES</text>
    <text x="20" y="42" fill="#92400E" font-size="9.5" font-style="italic">Every response is grounded · every claim cites a source · every AI call writes a reproducibility row</text>

    <g transform="translate(20,55)">
      <rect width="220" height="38" rx="6" fill="#FFFFFF" stroke="#D97706" stroke-width="1"/>
      <text x="14" y="16" fill="#0F2042" font-size="10" font-weight="700">groundedGenerationService</text>
      <text x="14" y="30" fill="#475569" font-size="8.5">cite-or-fallback · 0.6 floor · skeleton</text>
    </g>
    <g transform="translate(250,55)">
      <rect width="220" height="38" rx="6" fill="#FFFFFF" stroke="#D97706" stroke-width="1"/>
      <text x="14" y="16" fill="#0F2042" font-size="10" font-weight="700">Multi-LLM gateway</text>
      <text x="14" y="30" fill="#475569" font-size="8.5">Anthropic · OpenAI · Gemini · Llama-3</text>
    </g>
    <g transform="translate(480,55)">
      <rect width="220" height="38" rx="6" fill="#FFFFFF" stroke="#D97706" stroke-width="1"/>
      <text x="14" y="16" fill="#0F2042" font-size="10" font-weight="700">KbChunk vector store</text>
      <text x="14" y="30" fill="#475569" font-size="8.5">1536-dim · hybrid lexical+semantic</text>
    </g>
    <g transform="translate(710,55)">
      <rect width="210" height="38" rx="6" fill="#1E3A6E"/>
      <text x="14" y="16" fill="#FFFFFF" font-size="10" font-weight="700">recordAiDecision()</text>
      <text x="14" y="30" fill="#F59E0B" font-size="8.5">model · promptHash · confidence</text>
    </g>
  </g>

  <!-- UI surfaces -->
  <g transform="translate(30,550)">
    <text x="0" y="14" fill="#0F2042" font-size="10.5" font-weight="700">UI surfaces:</text>

    <g transform="translate(90,0)">
      <rect width="230" height="22" rx="11" fill="#1E3A6E"/>
      <text x="14" y="15" fill="#FFFFFF" font-size="9.5" font-weight="600">✨ AskHawkDrawer (sparkle bottom-left)</text>
    </g>
    <g transform="translate(330,0)">
      <rect width="230" height="22" rx="11" fill="#1E3A6E"/>
      <text x="14" y="15" fill="#FFFFFF" font-size="9.5" font-weight="600">🤖 ComplianceCopilot (right edge)</text>
    </g>
    <g transform="translate(570,0)">
      <rect width="370" height="22" rx="11" fill="#DBEAFE"/>
      <text x="14" y="15" fill="#1E3A6E" font-size="9.5" font-weight="600">Intent chips: 🧭 How-do-I  📋 SOPs  ⚖️ Regs  ✨ Do-this-for-me</text>
    </g>
  </g>

  <text x="500" y="615" fill="#475569" font-size="9" text-anchor="middle" font-style="italic">
    The AI assists, never commits. Every record is human-reviewed and e-signed. Active-learning loop captures every disposition (USER_ACCEPTED / EDITED / REJECTED).
  </text>
</svg>
