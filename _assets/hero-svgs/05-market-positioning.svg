<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Inter,sans-serif">
  <rect width="900" height="700" fill="#FAFBFC"/>

  <!-- Title -->
  <rect x="0" y="0" width="900" height="56" fill="#0F2042"/>
  <text x="32" y="35" fill="#FFFFFF" font-size="18" font-weight="700">The Market — Where Hawkeye Lives</text>
  <text x="32" y="50" fill="#94A3B8" font-size="10.5">Regulated-domain depth vs Industry breadth · The white space + competitor map</text>
  <text x="868" y="35" fill="#F59E0B" font-size="11" font-weight="700" text-anchor="end">v1.0</text>

  <!-- ============== QUADRANT ============== -->
  <g transform="translate(120,90)">
    <!-- Outer frame -->
    <rect width="650" height="500" fill="#FFFFFF" stroke="#1E3A6E" stroke-width="2"/>

    <!-- Quadrant background fills -->
    <rect x="0" y="0" width="325" height="250" fill="#FEF3C7" opacity="0.4"/>
    <rect x="325" y="0" width="325" height="250" fill="#DCFCE7" opacity="0.5"/>
    <rect x="0" y="250" width="325" height="250" fill="#F1F5F9"/>
    <rect x="325" y="250" width="325" height="250" fill="#FEE2E2" opacity="0.3"/>

    <!-- Axis lines -->
    <line x1="325" y1="0" x2="325" y2="500" stroke="#1E3A6E" stroke-width="1.5" stroke-dasharray="3,3"/>
    <line x1="0" y1="250" x2="650" y2="250" stroke="#1E3A6E" stroke-width="1.5" stroke-dasharray="3,3"/>

    <!-- Quadrant labels (in corners) -->
    <text x="20" y="22" fill="#92400E" font-size="11" font-weight="700">Deep but narrow</text>
    <text x="20" y="36" fill="#78350F" font-size="9" font-style="italic">vertical specialists</text>

    <text x="640" y="22" fill="#14532D" font-size="11" font-weight="700" text-anchor="end">🎯 THE WHITE SPACE</text>
    <text x="640" y="36" fill="#14532D" font-size="9" font-style="italic" text-anchor="end">where Hawkeye lives</text>

    <text x="20" y="490" fill="#475569" font-size="11" font-weight="700">Generic / niche</text>
    <text x="20" y="476" fill="#94A3B8" font-size="9" font-style="italic">point tools, spreadsheets</text>

    <text x="640" y="490" fill="#7F1D1D" font-size="11" font-weight="700" text-anchor="end">Right but not deep</text>
    <text x="640" y="476" fill="#B91C1C" font-size="9" font-style="italic" text-anchor="end">horizontal GRC platforms</text>

    <!-- ===== COMPETITOR DOTS ===== -->
    <!-- Pharma EQMS premium (top-left, deep + narrow) -->
    <g transform="translate(85,90)">
      <circle cx="0" cy="0" r="11" fill="#92400E" opacity="0.85"/>
      <text x="0" y="4" fill="#FFFFFF" font-size="9" font-weight="700" text-anchor="middle">V</text>
    </g>
    <text x="100" y="93" fill="#0F2042" font-size="10" font-weight="600">Veeva</text>
    <text x="100" y="105" fill="#475569" font-size="8">$30K+ floor · enterprise pharma</text>

    <g transform="translate(115,140)">
      <circle cx="0" cy="0" r="11" fill="#92400E" opacity="0.85"/>
      <text x="0" y="4" fill="#FFFFFF" font-size="9" font-weight="700" text-anchor="middle">M</text>
    </g>
    <text x="130" y="143" fill="#0F2042" font-size="10" font-weight="600">MasterControl</text>
    <text x="130" y="155" fill="#475569" font-size="8">Pharma + med-device · tier-1</text>

    <g transform="translate(155,195)">
      <circle cx="0" cy="0" r="11" fill="#92400E" opacity="0.85"/>
      <text x="0" y="4" fill="#FFFFFF" font-size="9" font-weight="700" text-anchor="middle">CQ</text>
    </g>
    <text x="170" y="198" fill="#0F2042" font-size="10" font-weight="600">ComplianceQuest</text>

    <g transform="translate(55,165)">
      <circle cx="0" cy="0" r="11" fill="#92400E" opacity="0.85"/>
      <text x="0" y="4" fill="#FFFFFF" font-size="9" font-weight="700" text-anchor="middle">G</text>
    </g>
    <text x="70" y="168" fill="#0F2042" font-size="10" font-weight="600">Greenlight Guru</text>
    <text x="70" y="180" fill="#475569" font-size="8">Med-device specialist</text>

    <!-- Audit-network plays -->
    <g transform="translate(75,225)">
      <circle cx="0" cy="0" r="11" fill="#92400E" opacity="0.85"/>
      <text x="0" y="4" fill="#FFFFFF" font-size="9" font-weight="700" text-anchor="middle">Q</text>
    </g>
    <text x="90" y="228" fill="#0F2042" font-size="10" font-weight="600">Qualifyze</text>
    <text x="90" y="240" fill="#475569" font-size="8">Pharma audit network only</text>

    <!-- TraceGains (food) -->
    <g transform="translate(110,235)">
      <circle cx="0" cy="0" r="9" fill="#92400E" opacity="0.7"/>
      <text x="0" y="3" fill="#FFFFFF" font-size="8" font-weight="700" text-anchor="middle">T</text>
    </g>

    <!-- ============== HAWKEYE — THE BIG ONE ============== -->
    <g transform="translate(490,90)">
      <!-- Outer glow / halo -->
      <circle cx="0" cy="0" r="32" fill="#F59E0B" opacity="0.25"/>
      <circle cx="0" cy="0" r="24" fill="#F59E0B" opacity="0.4"/>
      <!-- Main dot -->
      <circle cx="0" cy="0" r="18" fill="#1E3A6E" stroke="#F59E0B" stroke-width="3"/>
      <text x="0" y="5" fill="#FFFFFF" font-size="13" font-weight="700" text-anchor="middle">H</text>
    </g>
    <text x="535" y="80" fill="#0F2042" font-size="14" font-weight="800">HAWKEYE</text>
    <text x="535" y="95" fill="#1E3A6E" font-size="9.5" font-weight="600">SMB + emerging-market pharma</text>
    <text x="535" y="107" fill="#1E3A6E" font-size="9.5" font-weight="600">+ industry-agnostic engine</text>
    <text x="535" y="119" fill="#1E3A6E" font-size="9.5" font-weight="600">+ reproducible AI</text>

    <!-- Horizontal platforms (bottom-right) -->
    <g transform="translate(540,360)">
      <circle cx="0" cy="0" r="11" fill="#B91C1C" opacity="0.7"/>
      <text x="0" y="4" fill="#FFFFFF" font-size="9" font-weight="700" text-anchor="middle">SN</text>
    </g>
    <text x="555" y="363" fill="#0F2042" font-size="10" font-weight="600">ServiceNow</text>
    <text x="555" y="375" fill="#475569" font-size="8">GRC bolt-on · no GxP depth</text>

    <g transform="translate(580,410)">
      <circle cx="0" cy="0" r="11" fill="#B91C1C" opacity="0.7"/>
      <text x="0" y="4" fill="#FFFFFF" font-size="9" font-weight="700" text-anchor="middle">SAP</text>
    </g>
    <text x="595" y="413" fill="#0F2042" font-size="10" font-weight="600">SAP</text>

    <g transform="translate(540,450)">
      <circle cx="0" cy="0" r="11" fill="#B91C1C" opacity="0.7"/>
      <text x="0" y="4" fill="#FFFFFF" font-size="9" font-weight="700" text-anchor="middle">SF</text>
    </g>
    <text x="555" y="453" fill="#0F2042" font-size="10" font-weight="600">Salesforce</text>

    <!-- Spreadsheet status quo (bottom-left center) -->
    <g transform="translate(160,400)">
      <circle cx="0" cy="0" r="13" fill="#94A3B8"/>
      <text x="0" y="4" fill="#FFFFFF" font-size="9" font-weight="700" text-anchor="middle">XLS</text>
    </g>
    <text x="175" y="403" fill="#0F2042" font-size="10" font-weight="600">Spreadsheets + email</text>
    <text x="175" y="415" fill="#475569" font-size="8">~80% of SMB pharma today</text>

    <!-- Axis labels -->
    <text x="325" y="525" fill="#0F2042" font-size="11" font-weight="700" text-anchor="middle">→ Industry breadth</text>
    <text x="-250" y="-12" fill="#0F2042" font-size="11" font-weight="700" text-anchor="middle" transform="rotate(-90)">↑ Regulated-domain depth</text>

    <!-- Axis tick captions -->
    <text x="0" y="515" fill="#475569" font-size="9">single vertical</text>
    <text x="650" y="515" fill="#475569" font-size="9" text-anchor="end">multi-industry</text>
    <text x="-5" y="495" fill="#475569" font-size="9" text-anchor="end">low</text>
    <text x="-5" y="8" fill="#475569" font-size="9" text-anchor="end">deep</text>
  </g>

  <!-- Legend below -->
  <g transform="translate(120,615)">
    <text x="0" y="14" fill="#0F2042" font-size="10" font-weight="700">What lives where:</text>

    <g transform="translate(110,4)">
      <circle cx="0" cy="6" r="6" fill="#92400E" opacity="0.85"/>
    </g>
    <text x="125" y="14" fill="#475569" font-size="9">Pharma EQMS premium + specialists (deep, narrow, expensive)</text>

    <g transform="translate(370,4)">
      <circle cx="0" cy="6" r="6" fill="#B91C1C" opacity="0.7"/>
    </g>
    <text x="385" y="14" fill="#475569" font-size="9">Horizontal GRC (broad, no GxP depth)</text>

    <g transform="translate(575,4)">
      <circle cx="0" cy="6" r="6" fill="#1E3A6E" stroke="#F59E0B" stroke-width="2"/>
    </g>
    <text x="590" y="14" fill="#475569" font-size="9">Hawkeye (pharma-grade depth + cross-vertical + reproducible AI)</text>
  </g>

  <text x="450" y="668" fill="#475569" font-size="9" text-anchor="middle" font-style="italic">
    Veeva won't go horizontal (their depth IS the moat). ServiceNow won't go deep (no regulated-domain credibility). The unoccupied quadrant is real — and structurally protected.
  </text>
</svg>
